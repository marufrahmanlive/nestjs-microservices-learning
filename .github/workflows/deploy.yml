name: Deploy to Vultr VPS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Action Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Action Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        env:
          GIT_TOKEN: ${{ secrets.GIT_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          envs: GIT_TOKEN
          script: |
            # Define app directory
            APP_DIR="/home/deploy/nestjs-app"
            GITHUB_REPO="marufrahmanlive/nestjs-microservices-learning"

            # Check if app directory exists — if not, do first-time clone
            if [ ! -d "$APP_DIR" ]; then
              echo "=== First-time setup: cloning repository ==="
              mkdir -p /home/deploy
              git clone "https://${GIT_TOKEN}@github.com/${GITHUB_REPO}.git" "$APP_DIR"
            fi

            # Navigate to app directory
            cd "$APP_DIR"

            # Pull latest changes
            git pull "https://${GIT_TOKEN}@github.com/${GITHUB_REPO}.git" main

            # Install ALL dependencies (need @nestjs/cli for build)
            npm install

            # Build the application
            npm run build

            # Start or restart PM2 process
            if pm2 list | grep -q "nestjs-app"; then
              echo "=== Restarting existing PM2 process ==="
              pm2 restart ecosystem.config.js --env production
            else
              echo "=== Starting new PM2 process ==="
              pm2 start ecosystem.config.js --env production
            fi

            # Save PM2 configuration
            pm2 save
