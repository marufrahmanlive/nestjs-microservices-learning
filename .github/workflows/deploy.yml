name: Deploy to Vultr VPS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        env:
          GIT_TOKEN: ${{ secrets.GIT_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          envs: GIT_TOKEN
          script: |
            # Define app directory and repo URL (HTTPS, no token in URL for security)
            APP_DIR="/home/deploy/nestjs-app"
            REPO_URL="https://github.com/marufrahmanlive/nestjs-microservices-learning.git"

            # Check if app directory exists — if not, do first-time clone
            if [ ! -d "$APP_DIR" ]; then
              echo "=== First-time setup: cloning repository ==="
              mkdir -p /home/deploy
              git -c http.extraHeader="Authorization: Bearer ${GIT_TOKEN}" \
                clone "$REPO_URL" "$APP_DIR"
            fi

            # Navigate to app directory
            cd "$APP_DIR"

            # Pull latest changes (pass token via header to avoid persisting it)
            git -c http.extraHeader="Authorization: Bearer ${GIT_TOKEN}" \
              pull origin main

            # Install dependencies (omit dev deps in production)
            npm install --omit=dev

            # Build the application
            npm run build

            # Start or restart PM2 process
            if pm2 list | grep -q "nestjs-app"; then
              echo "=== Restarting existing PM2 process ==="
              pm2 restart ecosystem.config.js --env production
            else
              echo "=== Starting new PM2 process ==="
              pm2 start ecosystem.config.js --env production
            fi

            # Save PM2 configuration
            pm2 save
