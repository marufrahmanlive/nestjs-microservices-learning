name: Deploy to Vultr VPS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Action Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Action Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        #env:
        #GIT_TOKEN: ${{ secrets.GIT_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          #envs: GIT_TOKEN
          script: |
            #!/bin/bash
            set -Eeuo pipefail

            log() {
              echo ""
              echo "=========================================="
              echo "🚀 $1"
              echo "=========================================="
            }

            success() {
              echo "✅ $1"
            }

            trap 'echo ""; echo "❌ Deployment failed at line $LINENO"; exit 1' ERR

            APP_DIR="/home/deploy/nestjs-app"

            log "Checking repository"

            if [ ! -d "$APP_DIR/.git" ]; then
              log "Repository not found. Cloning..."
              mkdir -p /home/deploy
              git clone git@github.com:marufrahmanlive/nestjs-microservices-learning.git "$APP_DIR"
              success "Repository cloned"
            else
              success "Repository already exists"
            fi

            log "Moving to project directory"
            cd "$APP_DIR"
            success "Current directory: $(pwd)"

            log "Fetching latest code"
            git fetch origin
            git reset --hard origin/main
            success "Latest code pulled"

            log "Installing dependencies"
            npm install
            success "Dependencies installed"

            log "Building application"
            npm run build
            success "Build completed"

            log "Checking PM2 process"

            if pm2 describe nestjs-app >/dev/null 2>&1; then
                log "Reloading application"
                #pm2 restart ecosystem.config.js
                pm2 reload ecosystem.config.js --update-env
                #success "Application reloaded"
            else
                log "Starting application"
                pm2 start ecosystem.config.js
                success "Application started"
            fi

            log "Saving PM2 configuration"
            pm2 save
            success "PM2 configuration saved"

            echo ""
            echo "🎉======================================="
            echo "🎉 Deployment completed successfully!"
            echo "🎉======================================="
